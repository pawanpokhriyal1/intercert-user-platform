name: Deploy Test

on:
  push:
    branches: [main]

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build auth service
        run: npm install && npm run build
        working-directory: auth-service
      - name: Build user service
        run: npm install && npm run build
        working-directory: user-service
      - name: Trigger Render test deploys
        if: ${{ env.RENDER_AUTH_TEST_DEPLOY_HOOK != '' && env.RENDER_USER_TEST_DEPLOY_HOOK != '' }}
        env:
          RENDER_AUTH_TEST_DEPLOY_HOOK: ${{ secrets.RENDER_AUTH_TEST_DEPLOY_HOOK }}
          RENDER_USER_TEST_DEPLOY_HOOK: ${{ secrets.RENDER_USER_TEST_DEPLOY_HOOK }}
        run: |
          curl -X POST "$RENDER_AUTH_TEST_DEPLOY_HOOK"
          curl -X POST "$RENDER_USER_TEST_DEPLOY_HOOK"
